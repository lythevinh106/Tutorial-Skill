<div
    class="relative w-full max-w-container-max h-full max-h-[921px] glass-panel rounded-[24px] flex flex-col shadow-2xl overflow-hidden">
    <!-- Modal Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-whisper-border bg-white/20 shrink-0">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-muted-steel">description</span>
            <h2 class="font-headline-md text-headline-md text-charcoal-ink m-0">{{$ctrl.item.name || 'document.pdf'}}
            </h2>
            <span
                class="font-label-sm text-label-sm px-2 py-1 bg-white/50 rounded-full text-muted-steel ml-2">{{$ctrl.item.fileSizeStr}}</span>
        </div>
        <button ng-click="$ctrl.close()"
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/30 transition-colors text-muted-steel hover:text-charcoal-ink">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <!-- Split Screen Content -->
    <div class="flex flex-col lg:flex-row flex-grow overflow-hidden bg-white/10 min-h-0 capture-zone"
        id="capture-zone-{{$ctrl.item.id}}">
        <!-- Left Panel: Document Render -->
        <div class="w-full lg:w-1/2 flex flex-col relative h-full bg-surface-container-low/50 overflow-hidden">
            <screen-pdf ng-if="!$ctrl.item.fileType || $ctrl.item.fileType.includes('pdf')" item="$ctrl.item"
                class="h-full w-full block"></screen-pdf>
            <div ng-if="$ctrl.item.fileType && $ctrl.item.fileType.includes('image')" class="flex-1 w-full h-full flex items-start justify-center p-4 overflow-auto custom-scrollbar">
                <img ng-src="{{$ctrl.item.pdfUrl}}" class="max-w-full max-h-[800px] object-contain shadow-lg rounded"
                    alt="{{$ctrl.item.name}}" />
            </div>
        </div>

        <!-- Right Panel: Markdown Editor (Using ScreenMarkdownComponent) -->
        <div
            class="w-full lg:w-1/2 flex flex-col h-full bg-slate-50/50 backdrop-blur-xl relative border-l border-whisper-border">
            <screen-markdown item="$ctrl.item" is-modal-view="true"
                class="h-full w-full flex flex-col"></screen-markdown>
        </div>
    </div>

    <!-- Modal Global Footer -->
    <div
        class="p-4 bg-white/40 border-t border-whisper-border flex justify-between items-center shrink-0 w-full backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full"
                ng-class="{'bg-[#10B981]': $ctrl.item.status === 'success', 'bg-error': $ctrl.item.status === 'error'}">
            </div>
            <span class="text-[12px] font-medium text-muted-steel">
                {{ $ctrl.item.status === 'success' ? 'Parsing Complete' : 'Parsing Failed' }}
            </span>
        </div>
        <div class="flex items-center gap-3">
            <button ng-click="$ctrl.deleteQueue()"
                class="p-2 rounded-full border border-whisper-border bg-white/50 text-error hover:bg-error-container transition-colors flex items-center justify-center w-10 h-10 shadow-sm"
                title="Delete Queue">
                <span class="material-symbols-outlined text-[20px]">delete</span>
            </button>
            <button ng-if="$ctrl.item.markdownData !== $ctrl.originalMarkdown" ng-click="$ctrl.updateMarkdown()"
                class="px-5 py-2 rounded-full bg-surface-container-lowest border border-whisper-border text-charcoal-ink font-medium text-[12px] hover:bg-white shadow-sm transition-transform active:translate-y-px">Update
                Markdown</button>
            <button ng-click="$ctrl.downloadQueue()"
                class="bg-electric-ocean text-white rounded-full px-6 py-2 font-label-sm text-[12px] flex items-center gap-2 hover:opacity-90 transition-opacity shadow-md">
                <span class="material-symbols-outlined text-[16px]">download</span> Download Queue
            </button>
        </div>
    </div>
</div>
